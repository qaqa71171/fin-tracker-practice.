<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTracker - Вход</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="container">
        <div class="auth-form">
            <div class="logo">
                <i class="fas fa-chart-pie"></i>
                <h1>FinTracker</h1>
                <p>Управляй финансами с умом</p>
            </div>
            
            <!-- Форма входа -->
            <form id="loginForm">
                <h2>Вход в систему</h2>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Введите ваш email" required>
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required minlength="6">
                    <div class="error-message" id="passwordError"></div>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
                <p class="switch-page">
                    Нет аккаунта? <a href="#" id="showRegister">Зарегистрироваться</a>
                </p>
            </form>

            <!-- Форма регистрации (скрыта по умолчанию) -->
            <form id="registerForm" class="hidden">
                <h2>Регистрация</h2>
                <div class="form-group">
                    <label for="regName"><i class="fas fa-user"></i> Имя</label>
                    <input type="text" id="regName" placeholder="Введите ваше имя" required>
                </div>
                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <p class="switch-page">
                    Уже есть аккаунт? <a href="#" id="showLogin">Войти</a>
                </p>
            </form>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
