<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTracker - Транзакции</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Боковое меню -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-chart-pie"></i> FinTracker
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="dashboard.html"><i class="fas fa-th-large"></i> Дашборд</a>
                    </li>
                    <li class="active">
                        <a href="transactions.html"><i class="fas fa-exchange-alt"></i> Транзакции</a>
                    </li>
                    <li>
                        <a href="#"><i class="fas fa-wallet"></i> Бюджет</a>
                    </li>
                    <li>
                        <a href="#"><i class="fas fa-chart-bar"></i> Отчеты</a>
                    </li>
                    <li>
                        <a href="#"><i class="fas fa-cog"></i> Настройки</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="content">
            <header class="top-bar">
                <h1>Транзакции</h1>
                <button id="openModalBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Добавить
                </button>
            </header>

            <!-- Таблица транзакций -->
            <section>
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Категория</th>
                            <th>Описание</th>
                            <th>Сумма</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>12.05.2026</td>
                            <td><span class="badge income-badge">Доход</span></td>
                            <td>Зарплата</td>
                            <td class="text-success">+85 000 ₽</td>
                            <td>
                                <i class="fas fa-edit action-icon"></i>
                                <i class="fas fa-trash-alt action-icon"></i>
                            </td>
                        </tr>
                        <tr>
                            <td>10.05.2026</td>
                            <td><span class="badge expense-badge">Продукты</span></td>
                            <td>Пятёрочка</td>
                            <td class="text-danger">-2 450 ₽</td>
                            <td>
                                <i class="fas fa-edit action-icon"></i>
                                <i class="fas fa-trash-alt action-icon"></i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Модальное окно добавления транзакции -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Новая транзакция</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <label>Тип</label>
                    <select id="type" required>
                        <option value="expense">Расход</option>
                        <option value="income">Доход</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сумма</label>
                    <input type="number" id="amount" placeholder="0.00" required min="1">
                    <div class="error-message" id="amountError"></div>
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <input type="text" id="category" placeholder="Например, Еда" required>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <div id="modalSuccess" class="success-message hidden">
                    Транзакция успешно добавлена!
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
